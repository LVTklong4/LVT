<script>
    /**
     * TEMPLATE: PRINT CHECKLIST (A4 Portrait)
     * โครงสร้าง HTML สำหรับพิมพ์ใบเดินเก็บเงิน (Checklist)
     * Update: Fix customer name mapping, Re-layout columns (Idea 1), Visual Tags for stalls (Idea 2)
     */
    function generateChecklistHtml(sortedRisks, dateStr, todayName) {
        const thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        let formattedDate = dateStr;
        try {
            const [y, m, d] = dateStr.split('-');
            formattedDate = `${parseInt(d)} ${thaiMonths[parseInt(m)-1]} ${parseInt(y)+543}`;
        } catch(e) {}
        
        const printTime = new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
        let officerName = typeof currentAdmin !== 'undefined' && currentAdmin ? currentAdmin.name : "-";
        
        const IMG_LOGO_URL = "https://img2.pic.in.th/pic/Profile-Alpha_0.png";
        const fmt = (n) => parseFloat(n || 0).toLocaleString(undefined, {minimumFractionDigits: 0});

        let tableRows = "";
        let totalDebt = 0;

        sortedRisks.forEach((item, index) => {
            const debt = parseFloat(item.debt || 0);
            totalDebt += debt;
            
            // แยกประเภทลูกค้า
            let typeLabel = "รายเดือน";
            if (item.customerType === 'Regular') typeLabel = "ประจำ";
            
            // --- IDEA 2: สร้าง Visual Tags ให้รายการล็อค ---
            let stallTagsHtml = "-";
            if (item.stalls) {
                // แยกด้วยลูกน้ำ และสร้างกล่อง Tag ให้แต่ละล็อค
                const stallArr = item.stalls.split(',').map(s => s.trim()).filter(s => s !== "");
                stallTagsHtml = stallArr.map(s => 
                    `<span style="display: inline-block; border: 1px solid #9ca3af; background-color: #f3f4f6; padding: 2px 6px; border-radius: 4px; margin-right: 3px; margin-bottom: 3px; font-size: 13px; font-weight: bold; color: #374151;">${s}</span>`
                ).join('');
            }

            // --- FIX: ดึงชื่อลูกค้ามาแสดง (ใน Dashboard รวมชื่อกับสินค้าไว้ใน item.name แล้ว) ---
            const displayName = item.name || "-";
            
            tableRows += `
                <tr style="border-bottom: 1px solid #d1d5db;">
                    <td style="padding: 8px; text-align: center; vertical-align: middle;">
                        <div style="width: 20px; height: 20px; border: 2px solid #9ca3af; border-radius: 4px; display: inline-block;"></div>
                    </td>
                    <!-- IDEA 1: จัดชิดซ้าย (Left Align) และให้พื้นที่กว้างขึ้น -->
                    <td style="padding: 8px; text-align: left; vertical-align: top;">
                        ${stallTagsHtml}
                    </td>
                    <td style="padding: 8px; vertical-align: top;">
                        <div style="font-weight: bold; font-size: 14px; color: #1f2937;">${displayName}</div>
                        <div style="font-size: 11px; margin-top: 4px;">
                            <span style="background: #e5e7eb; color: #4b5563; padding: 2px 6px; border-radius: 4px; font-weight: bold;">${typeLabel}</span>
                        </div>
                    </td>
                    <td style="padding: 8px; text-align: right; font-weight: bold; font-size: 16px; color: #dc2626; vertical-align: top;">
                        ${fmt(debt)}
                    </td>
                    <td style="padding: 8px; border-left: 1px dashed #d1d5db; vertical-align: top;">
                        <!-- พื้นที่ว่างสำหรับเขียนหมายเหตุ -->
                    </td>
                </tr>
            `;
        });

        return `
            <div class="a4-page-portrait" style="font-family: 'Sarabun', sans-serif; color: #000; background: #fff; width: 210mm; min-height: 297mm; padding: 10mm 15mm; box-sizing: border-box; margin: 0 auto; position: relative;">
                
                <!-- HEADER -->
                <div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px;">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <img src="${IMG_LOGO_URL}" style="width: 60px; height: auto;">
                        <div>
                            <h1 style="font-size: 22px; font-weight: bold; margin: 0; line-height: 1.2;">ใบงานติดตามหนี้ค้างชำระ ${todayName ? '(' + todayName + ')' : ''}</h1>
                            <h2 style="font-size: 14px; color: #4b5563; margin: 0;">ตลาดนัดลาดสวายวินเทจ</h2>
                        </div>
                    </div>
                    <div style="text-align: right; font-size: 12px; color: #374151;">
                        <div>ประจำวันที่: <b>${formattedDate}</b></div>
                        <div>เวลาพิมพ์: ${printTime}</div>
                        <div>ผู้พิมพ์: ${officerName}</div>
                    </div>
                </div>

                <!-- SUMMARY -->
                <div style="display: flex; justify-content: space-between; align-items: center; background-color: #fef2f2; border: 1px solid #fca5a5; padding: 10px 15px; border-radius: 6px; margin-bottom: 15px;">
                    <div style="font-size: 14px; color: #991b1b;">
                        จำนวนลูกหนี้ที่ต้องตามเก็บ: <b>${sortedRisks.length} ราย</b>
                    </div>
                    <div style="font-size: 16px; color: #991b1b;">
                        ยอดรวมเป้าหมาย: <b style="font-size: 20px;">${fmt(totalDebt)} บาท</b>
                    </div>
                </div>

                <!-- TABLE -->
                <!-- IDEA 1: กำหนดความกว้างคอลัมน์ใหม่ให้ ล็อค กว้างขึ้น -->
                <table style="width: 100%; border-collapse: collapse; font-size: 14px; table-layout: fixed;">
                    <thead>
                        <tr style="background-color: #f3f4f6; border-top: 2px solid #000; border-bottom: 2px solid #000;">
                            <th style="padding: 8px; width: 45px; text-align: center;">ชำระ</th>
                            <th style="padding: 8px; width: 170px; text-align: left;">ล็อค</th>
                            <th style="padding: 8px; text-align: left;">ชื่อลูกค้า/สินค้า</th>
                            <th style="padding: 8px; width: 90px; text-align: right;">ยอดค้าง (บ.)</th>
                            <th style="padding: 8px; width: 140px; text-align: center;">หมายเหตุเจ้าหน้าที่</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>

                <!-- FOOTER / SIGNATURE -->
                <div style="margin-top: 40px; display: flex; justify-content: space-between; align-items: flex-end; padding: 0 20px;">
                    <div style="text-align: center; width: 40%;">
                        <div style="border-bottom: 1px dotted #000; margin-bottom: 5px; height: 30px;"></div>
                        <div style="font-size: 12px;">(......................................................)</div>
                        <div style="font-size: 12px; margin-top: 2px;">พนักงานเก็บเงิน</div>
                    </div>
                    <div style="text-align: center; width: 40%;">
                        <div style="border-bottom: 1px dotted #000; margin-bottom: 5px; height: 30px;"></div>
                        <div style="font-size: 12px;">(......................................................)</div>
                        <div style="font-size: 12px; margin-top: 2px;">ผู้รับยอด (การเงิน)</div>
                    </div>
                </div>

            </div>

            <!-- CSS FOR PRINT -->
            <style>
                @media print {
                    @page { 
                        size: A4 portrait; 
                        margin: 0mm; 
                    }
                    body { 
                        margin: 0; 
                        padding: 0; 
                        -webkit-print-color-adjust: exact !important; 
                        print-color-adjust: exact !important;
                    }
                    /* SHOW ONLY PRINT AREA */
                    body * { visibility: hidden; }
                    #report-print-area, #report-print-area * { visibility: visible !important; }
                    #report-print-area {
                        position: absolute; left: 0; top: 0; width: 100%; height: 100%; z-index: 99999; background: white; display: block !important;
                    }
                    .no-print { display: none !important; }
                }
            </style>
        `;
    }
</script>
