<script>
    /**
     * Scripts_Session
     * จัดการ Session และ Firebase Authentication
     * Update: ผูก Logic ควบคุมปุ่มเข้ากับระบบ Dropdown แนวตั้งตัวใหม่
     */

    const firebaseConfig = {
      apiKey: "AIzaSyAKExhCzumzvCoU0tpjiyU_zPHiTLgaEzM",
      authDomain: "ladsawaivintage-9bb71.firebaseapp.com",
      projectId: "ladsawaivintage-9bb71",
      storageBucket: "ladsawaivintage-9bb71.firebasestorage.app",
      messagingSenderId: "1082363055126",
      appId: "1:1082363055126:web:f646e4ec1973e353cb7937"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    function checkSession() {
        const sessionJson = localStorage.getItem(SESSION_KEY);
        if (sessionJson) {
            try {
                const session = JSON.parse(sessionJson);
                const now = Date.now();
                if (now - session.lastActive < SESSION_TIMEOUT) {
                    restoreAdminUI(session);
                    return;
                }
            } catch(e) { console.error("Session Parse Error", e); }
        }
        localStorage.removeItem(SESSION_KEY);
    }

    function restoreAdminUI(userSession) {
        currentAdmin = { 
            name: userSession.name, 
            role: userSession.role,
            employeeId: userSession.employeeId,
            email: userSession.email,
            photoUrl: userSession.photoUrl
        };

        const badge = document.getElementById('admin_badge');
        if(badge) badge.innerText = userSession.name;
        
        const avatar = document.getElementById('userAvatar');
        const defIcon = document.getElementById('defaultUserIcon');
        if (avatar && userSession.photoUrl) {
            avatar.src = userSession.photoUrl;
            avatar.classList.remove('hidden');
            if(defIcon) defIcon.classList.add('hidden');
        }

        // --- อัปเดตข้อความใน Dropdown Profile ---
        const dropName = document.getElementById('dropdown_name');
        const dropRole = document.getElementById('dropdown_role');
        const authText = document.getElementById('authText');
        const authIcon = document.getElementById('authIcon');

        if(dropName) dropName.innerText = userSession.name;
        if(dropRole) {
            dropRole.innerText = userSession.role;
            dropRole.className = "text-[10px] text-green-800 bg-green-100 border border-green-200 inline-block px-2 py-0.5 rounded-full mt-1 font-bold tracking-widest uppercase";
        }
        if(authText) authText.innerText = "ออกจากระบบ";
        if(authIcon) authIcon.className = "fa-solid fa-sign-out-alt w-6 text-center text-red-600";

        // --- การเปิดแสดงปุ่มเมนูที่อยู่ใน Dropdown ---
        const idsToShow = [
            'btnNextDate', 'btnPrevDate', 'btnArchive', 
            'btnMonthlyTop', 'btnStorageTop',
            'btnPrintMap', 'btnExtraBooking', 'btnKhlongThom',
            'btnOpMenu' // แสดงปุ่ม "จัดการระบบ"
        ];
        
        idsToShow.forEach(id => {
            const el = document.getElementById(id);
            if(el) { 
                el.classList.remove('hidden'); 
                // ใช้ Tailwind class ใน HTML แทนการยัด style inline
                el.style.display = ''; 
                if (el.classList.contains('w-full')) el.classList.add('flex'); // สำหรับเมนูใน Dropdown
            }
        });

        const roleStr = String(currentAdmin.role || "").trim().toLowerCase();
        const isAdminOrSuper = (roleStr === 'admin' || roleStr === 'super admin');
        const isSuper = (roleStr === 'super admin');

        if(isAdminOrSuper) {
            const btnRef = document.getElementById('btnRefreshCache');
            if(btnRef) { btnRef.classList.remove('hidden'); btnRef.style.display = ''; btnRef.classList.add('flex'); }
        }

        if(isSuper) {
            const btnDash = document.getElementById('btnDashboard');
            if(btnDash) { btnDash.classList.remove('hidden'); btnDash.style.display = ''; btnDash.classList.add('flex'); }
            
            const btnSet = document.getElementById('btnSettings');
            if(btnSet) { btnSet.classList.remove('hidden'); btnSet.style.display = ''; btnSet.classList.add('flex'); }
        }

        if(typeof hideModal === 'function') {
            hideModal('loginModal');
            hideModal('logoutModal');
        }
        
        updateSessionActivity();
    }

    function updateSessionActivity() {
        if (currentAdmin) {
            const session = { ...currentAdmin, lastActive: Date.now() };
            localStorage.setItem(SESSION_KEY, JSON.stringify(session));
        }
    }

    function doGoogleLogin() {
        const btn = document.getElementById('btnGoogleLogin');
        if(btn) {
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> กำลังตรวจสอบ...';
            btn.classList.add('opacity-70', 'cursor-not-allowed');
        }

        auth.signInWithPopup(provider)
            .then((result) => {
                verifyWithBackend(result.user.email, result.user.photoURL);
            })
            .catch((error) => {
                console.error(error);
                showAlert("เกิดข้อผิดพลาด: " + error.message, "เข้าสู่ระบบไม่สำเร็จ", true);
                if(btn) {
                    btn.innerHTML = '<img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6 group-hover:brightness-200 transition-all duration-300"><span class="text-sm font-kanit">เข้าสู่ระบบด้วย Google</span>';
                    btn.classList.remove('opacity-70', 'cursor-not-allowed');
                }
            });
    }

    function verifyWithBackend(email, photoUrl) {
        showLoader();
        google.script.run.withSuccessHandler(function(res) {
            hideLoader();
            if (res.success) {
                const userSession = {
                    name: res.name,
                    role: res.role,
                    employeeId: res.employeeId,
                    email: email,
                    photoUrl: photoUrl
                };
                restoreAdminUI(userSession);
                showAlert(`ยินดีต้อนรับ ${res.name}`, "เข้าสู่ระบบสำเร็จ", false);
            } else {
                auth.signOut();
                showAlert(res.message, "เข้าสู่ระบบไม่สำเร็จ", true);
                const btn = document.getElementById('btnGoogleLogin');
                if(btn) {
                    btn.innerHTML = '<img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6 group-hover:brightness-200 transition-all duration-300"><span class="text-sm font-kanit">เข้าสู่ระบบด้วย Google</span>';
                    btn.classList.remove('opacity-70', 'cursor-not-allowed');
                }
            }
        }).checkLogin(email); 
    }

    function toggleAdminPanel() {
        if (currentAdmin) {
            const nameEl = document.getElementById('logout_name');
            const roleEl = document.getElementById('logout_role');
            if(nameEl) nameEl.innerText = currentAdmin.name || 'Admin';
            if(roleEl) roleEl.innerText = currentAdmin.role || 'User';
            
            if(typeof showModal === 'function') showModal('logoutModal');
            else document.getElementById('logoutModal').classList.remove('hidden');
        } else {
            if(typeof showModal === 'function') showModal('loginModal');
            else document.getElementById('loginModal').classList.remove('hidden');
        }
    }

    function confirmLogout() {
        if(typeof hideModal === 'function') hideModal('logoutModal');
        
        auth.signOut().then(() => { console.log("Firebase Signed Out"); });

        currentAdmin = null;
        localStorage.removeItem(SESSION_KEY);
        
        const badge = document.getElementById('admin_badge');
        if(badge) badge.innerText = "";
        
        const avatar = document.getElementById('userAvatar');
        const defIcon = document.getElementById('defaultUserIcon');
        if(avatar) avatar.classList.add('hidden');
        if(defIcon) defIcon.classList.remove('hidden');

        // รีเซ็ตข้อความใน Dropdown Profile ให้กลับเป็น Guest
        const dropName = document.getElementById('dropdown_name');
        const dropRole = document.getElementById('dropdown_role');
        const authText = document.getElementById('authText');
        const authIcon = document.getElementById('authIcon');

        if(dropName) dropName.innerText = "Guest";
        if(dropRole) {
            dropRole.innerText = "Please Login";
            dropRole.className = "text-[10px] text-gray-500 bg-gray-200 inline-block px-2 py-0.5 rounded-full mt-1 font-bold tracking-widest uppercase";
        }
        if(authText) authText.innerText = "เข้าสู่ระบบ";
        if(authIcon) authIcon.className = "fa-solid fa-sign-in-alt w-6 text-center text-green-600";

        // ซ่อนปุ่มแอดมินทั้งหมด
        const elementsToHide = [
            'btnNextDate', 'btnPrevDate', 'btnArchive', 
            'btnMonthlyTop', 'btnStorageTop',
            'btnRefreshCache', 'btnSettings',
            'btnDashboard', 'btnPrintMap',
            'btnExtraBooking', 'btnKhlongThom',
            'btnOpMenu' // ซ่อนปุ่ม "จัดการระบบ"
        ];
        
        elementsToHide.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('hidden');
                el.classList.remove('flex'); // เอา flex ออกด้วยเพื่อความชัวร์
                el.style.display = ''; 
            }
        });
        
        fetchData();
    }
</script>
