<script>
    /**
     * Scripts_Accounting
     * Client-side Logic for Accounting Tab
     * Update: Added Closing History Fetch & Filter by Year logic
     * FIX: Day Lock UI Integration (ซ่อนปุ่มเมื่อวันถูกปิดยอดแล้ว)
     */

    let closingHistoryCache = []; 

    function fetchAccountingOnly() {
        const loader = document.getElementById('dashLoading');
        if(loader) loader.classList.remove('hidden');
        
        const dateInput = document.getElementById('acc_date_filter');
        const dateVal = dateInput ? dateInput.value : "";
        
        google.script.run
            .withSuccessHandler((res) => {
                if(loader) loader.classList.add('hidden');
                if (res.success) {
                    if (!window.currentDashboardData) window.currentDashboardData = {};
                    window.currentDashboardData.accounting = res.accounting;
                    window.currentDashboardData.stalls = res.stalls;
                    window.currentDashboardData.bookings = res.bookings;
                    window.currentDashboardData.monthlyStats = res.monthlyStats;
                    
                    // รับสถานะจากหลังบ้านว่า วันนี้ปิดยอดแล้วหรือยัง
                    window.currentDashboardData.isClosed = res.isClosed;
                    
                    renderAccountingUI(res.accounting, res.date, res.isClosed);
                } else {
                    showAlert(res.message, "Error", true);
                }
            })
            .withFailureHandler((err) => {
                if(loader) loader.classList.add('hidden');
                showAlert("Fetch Failed: " + err, "Error", true);
            })
            .getAccountingData(dateVal);
    }

    // --- FIX: เพิ่มพารามิเตอร์ isClosed เข้ามาเช็ค ---
    function renderAccountingUI(acc, dateStr, isClosed) {
        if(!acc) return;
        
        // Summary
        const summary = acc.summary;
        if(document.getElementById('rpt_sum_total')) document.getElementById('rpt_sum_total').innerText = summary.totalIncome.toLocaleString();

        // Tables
        renderIncomeTable(acc.incomes);
        renderExpenseTable(acc.expenses);
        
        // Closing Form Defaults
        const sysCashInput = document.getElementById('closing_system_cash');
        const netCashDisplay = document.getElementById('rpt_sum_net_cash');
        const netCash = summary.netCash; 
        
        if(sysCashInput) sysCashInput.value = netCash;
        if(netCashDisplay) netCashDisplay.innerText = netCash.toLocaleString(undefined, {minimumFractionDigits: 2});
        
        if(typeof calcDiff === 'function') calcDiff();

        // --- NEW: UI LOCK FOR CLOSED DAYS ---
        const btnInc = document.getElementById('btn_add_income');
        const btnExp = document.getElementById('btn_add_expense');
        const msgLock = document.getElementById('msg_already_closed');
        const actCash = document.getElementById('closing_actual_cash');
        const note = document.getElementById('closing_note');
        const btnSubmit = document.getElementById('btn_submit_closing');

        // ถ้าปิดยอดแล้ว -> ล็อก
        if (isClosed) {
            if(btnInc) btnInc.classList.add('hidden');
            if(btnExp) btnExp.classList.add('hidden');
            if(msgLock) msgLock.classList.remove('hidden');
            if(btnSubmit) btnSubmit.classList.add('hidden');
            if(actCash) { actCash.disabled = true; actCash.value = ''; }
            if(note) { note.disabled = true; note.value = ''; }
        } else {
            if(btnInc) btnInc.classList.remove('hidden');
            if(btnExp) btnExp.classList.remove('hidden');
            if(msgLock) msgLock.classList.add('hidden');
            if(btnSubmit) btnSubmit.classList.remove('hidden');
            if(actCash) { actCash.disabled = false; actCash.value = ''; }
            if(note) { note.disabled = false; note.value = ''; }
        }
    }

    function renderIncomeTable(list) {
        const tbody = document.getElementById('tbl_incomes');
        const summaryEl = document.getElementById('header_inc_summary');
        
        if(!tbody) return;
        tbody.innerHTML = '';
        let sumCash = 0;
        let sumTransfer = 0;

        if (!list || list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="2" class="p-4 text-center text-[#8D6E63] italic text-xs font-hand">ไม่มีรายรับในวันนี้</td></tr>';
        } else {
            list.sort((a,b) => b.amount - a.amount);
            list.forEach(item => {
                const amt = parseFloat(item.amount || 0);
                if (item.method === 'Cash') sumCash += amt; else sumTransfer += amt;

                const methodBadge = item.method === 'Cash' 
                    ? '<span class="text-[#2E7D32] bg-[#E8F5E9] px-1.5 py-0.5 rounded border border-[#A5D6A7] font-bold">สด</span>' 
                    : '<span class="text-[#1565C0] bg-[#E3F2FD] px-1.5 py-0.5 rounded border border-[#90CAF9] font-bold">โอน</span>';
                
                const typeBadge = item.type === 'Manual' 
                    ? `<span class="text-[#E65100] border border-[#FFCC80] px-1 rounded ml-1 bg-[#FFF3E0]">อื่นๆ</span>` 
                    : '';
                
                const tr = document.createElement('tr');
                tr.className = "hover:bg-[#FFF8E1] transition-colors border-b border-[#D7CCC8] last:border-0";
                tr.innerHTML = `
                    <td class="p-3">
                        <div class="font-bold text-[#5D4037] text-xs flex items-center flex-wrap font-hand">
                            ${item.category} ${typeBadge}
                        </div>
                        <div class="text-[10px] text-[#8D6E63] truncate max-w-[200px] mt-0.5 flex items-center gap-1">
                            ${item.desc || '-'} ${methodBadge}
                        </div>
                    </td>
                    <td class="p-3 text-right text-sm font-mono text-[#2E7D32] font-bold">+${amt.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                `;
                tbody.appendChild(tr);
            });
        }
        
        if(summaryEl) summaryEl.innerText = `สด: ${sumCash.toLocaleString()} | โอน: ${sumTransfer.toLocaleString()}`;
    }

    function renderExpenseTable(list) {
        const tbody = document.getElementById('tbl_expenses');
        const summaryEl = document.getElementById('header_exp_summary');

        if(!tbody) return;
        tbody.innerHTML = '';
        let sumCash = 0;
        let sumTransfer = 0;

        if (!list || list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="2" class="p-4 text-center text-[#8D6E63] italic text-xs font-hand">ไม่มีรายจ่ายในวันนี้</td></tr>';
        } else {
            list.forEach(item => {
                const amt = parseFloat(item.amount || 0);
                if (item.method === 'Cash') sumCash += amt; else sumTransfer += amt;

                const methodBadge = item.method === 'Cash' 
                    ? '<span class="text-[#2E7D32] bg-[#E8F5E9] px-1.5 py-0.5 rounded border border-[#A5D6A7] font-bold">สด</span>' 
                    : '<span class="text-[#1565C0] bg-[#E3F2FD] px-1.5 py-0.5 rounded border border-[#90CAF9] font-bold">โอน</span>';

                const tr = document.createElement('tr');
                tr.className = "hover:bg-[#FFF8E1] transition-colors border-b border-[#D7CCC8] last:border-0";
                tr.innerHTML = `
                    <td class="p-3">
                        <div class="font-bold text-[#5D4037] text-xs font-hand">${item.category}</div>
                        <div class="text-[10px] text-[#8D6E63] truncate max-w-[200px] mt-0.5 flex items-center gap-1">
                            ${item.item || '-'} ${methodBadge}
                        </div>
                    </td>
                    <td class="p-3 text-right text-sm font-mono text-[#C62828] font-bold">-${amt.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                `;
                tbody.appendChild(tr);
            });
        }
        
        if(summaryEl) summaryEl.innerText = `สด: ${sumCash.toLocaleString()} | โอน: ${sumTransfer.toLocaleString()}`;
    }

    function calcDiff() {
        const sysCashEl = document.getElementById('closing_system_cash');
        const actCashEl = document.getElementById('closing_actual_cash');
        const diffEl = document.getElementById('closing_diff');
        
        if(!sysCashEl || !actCashEl || !diffEl) return;

        const sysCash = parseFloat(sysCashEl.value || 0);
        const actCash = parseFloat(actCashEl.value.replace(/,/g, '') || 0);
        const diff = actCash - sysCash;
        
        diffEl.innerText = (diff > 0 ? '+' : '') + diff.toLocaleString(undefined, {minimumFractionDigits: 2});
        
        if (Math.abs(diff) < 0.01) {
            diffEl.className = "text-2xl font-extrabold text-[#2E7D32] font-hand"; 
        } else if (diff > 0) {
            diffEl.className = "text-2xl font-extrabold text-[#1565C0] font-hand"; 
        } else {
            diffEl.className = "text-2xl font-extrabold text-[#C62828] font-hand"; 
        }
    }
    
    function previewDailyReport() {
        const dateFilter = document.getElementById('acc_date_filter').value;
        const actCash = parseFloat(document.getElementById('closing_actual_cash').value.replace(/,/g, '') || 0);
        const sysCash = parseFloat(document.getElementById('closing_system_cash').value || 0);
        const diff = actCash - sysCash;
        const note = document.getElementById('closing_note').value;
        
        if (typeof printDailyReport === 'function' && window.currentDashboardData) {
             printDailyReport(window.currentDashboardData, dateFilter, actCash, diff, note);
        } else {
             // If data missing, try fetch first
             fetchAccountingOnly();
             setTimeout(() => {
                 if (window.currentDashboardData) {
                    printDailyReport(window.currentDashboardData, dateFilter, actCash, diff, note);
                 } else {
                    showAlert("ข้อมูลยังไม่พร้อม กรุณาลองใหม่อีกครั้ง", "แจ้งเตือน");
                 }
             }, 1500);
        }
    }
    
    function switchClosingTab(tab) {
        const btnForm = document.getElementById('tab_closing_form');
        const btnHist = document.getElementById('tab_closing_history');
        const secForm = document.getElementById('closing_form_section');
        const secHist = document.getElementById('closing_history_section');
        const btnPreview = document.getElementById('btn_preview_report');

        const activeStyle = "px-5 py-2 bg-[#4A3B32] text-[#FDF5E6] font-bold rounded-t-lg font-hand transition-colors border-t-2 border-l-2 border-r-2 border-[#4A3B32] z-10";
        const inactiveStyle = "px-5 py-2 bg-[#EFEBE9] text-[#5D4037] font-bold rounded-t-lg font-hand transition-colors hover:bg-[#D7CCC8] border-t-2 border-l-2 border-r-2 border-transparent";

        if (tab === 'form') {
            btnForm.className = activeStyle;
            btnHist.className = inactiveStyle;
            secForm.classList.remove('hidden');
            secHist.classList.add('hidden');
            btnPreview.classList.remove('hidden');
        } else {
            btnHist.className = activeStyle;
            btnForm.className = inactiveStyle;
            secForm.classList.add('hidden');
            secHist.classList.remove('hidden');
            btnPreview.classList.add('hidden');
            
            fetchClosingHistory();
        }
    }

    function fetchClosingHistory() {
        const tbody = document.getElementById('tbl_closing_history');
        if (tbody) tbody.innerHTML = '<tr><td colspan="6" class="p-6 text-center text-[#8D6E63] italic font-hand"><i class="fa-solid fa-spinner fa-spin mr-2"></i>กำลังดึงข้อมูลประวัติ...</td></tr>';
        
        google.script.run
            .withSuccessHandler((res) => {
                if (res.success) {
                    closingHistoryCache = res.data; 
                    populateHistoryYearDropdown();  
                    applyHistoryYearFilter();       
                } else {
                    if (tbody) tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-red-500 font-bold">${res.message}</td></tr>`;
                }
            })
            .withFailureHandler((err) => {
                if (tbody) tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-red-500 font-bold">Error: ${err}</td></tr>`;
            })
            .getClosingHistory();
    }

    function populateHistoryYearDropdown() {
        const select = document.getElementById('filter_history_year');
        if (!select) return;
        
        const currentVal = select.value;
        const years = new Set();
        
        closingHistoryCache.forEach(item => {
            if(item.date) {
                const [y, m, d] = item.date.split('-');
                years.add(parseInt(y) + 543);
            }
        });
        
        let html = '<option value="ALL">ทั้งหมด</option>';
        Array.from(years).sort((a,b) => b - a).forEach(year => {
            html += `<option value="${year}">${year}</option>`;
        });
        
        select.innerHTML = html;
        
        const thisYearTH = new Date().getFullYear() + 543;
        if (currentVal && currentVal !== 'ALL') {
            select.value = currentVal;
        } else if (years.has(thisYearTH)) {
            select.value = thisYearTH;
        }
    }

    function applyHistoryYearFilter() {
        const select = document.getElementById('filter_history_year');
        const selectedYear = select ? select.value : 'ALL';
        
        let filteredData = closingHistoryCache;
        
        if (selectedYear !== 'ALL') {
            filteredData = closingHistoryCache.filter(item => {
                if(!item.date) return false;
                const [y, m, d] = item.date.split('-');
                return (parseInt(y) + 543).toString() === selectedYear;
            });
        }
        
        renderClosingHistory(filteredData);
    }

    function renderClosingHistory(data) {
        const tbody = document.getElementById('tbl_closing_history');
        if (!tbody) return;
        
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="p-6 text-center text-[#8D6E63] italic font-hand">ไม่พบประวัติการปิดยอดในปีที่เลือก</td></tr>';
            return;
        }

        let html = '';
        data.forEach(item => {
            const diffColor = item.diff > 0 ? 'text-[#1565C0]' : (item.diff < 0 ? 'text-[#C62828]' : 'text-[#2E7D32]');
            
            const thaiMonths = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            let dateDisplay = item.date;
            try {
                const [y, m, d] = item.date.split('-');
                dateDisplay = `${parseInt(d)} ${thaiMonths[parseInt(m)-1]} ${parseInt(y)+543}`;
            } catch(e) {}
            
            let timeStr = "";
            try {
                const parts = item.timestamp.split(' ');
                if(parts.length > 1) timeStr = parts[1].substring(0, 5); 
            } catch(e) {}

            let linkBtn = '<span class="text-gray-400 text-[10px] bg-gray-100 px-2 py-1 rounded">ไม่มีเอกสาร</span>';
            if (item.url && item.url.trim() !== "") {
                linkBtn = `<a href="${item.url}" target="_blank" class="px-3 py-1.5 bg-red-50 text-red-600 rounded border border-red-200 text-xs font-bold hover:bg-red-100 transition shadow-sm inline-flex items-center gap-1"><i class="fa-solid fa-file-pdf"></i> ดู PDF</a>`;
            }

            html += `
                <tr class="hover:bg-[#FFF8E1] transition-colors border-b border-[#D7CCC8] last:border-0">
                    <td class="p-3">
                        <div class="font-bold text-[#5D4037] text-sm">${dateDisplay}</div>
                        <div class="text-[10px] text-gray-500">${timeStr} น.</div>
                    </td>
                    <td class="p-3 text-right text-gray-700">${parseFloat(item.systemTotal || 0).toLocaleString()}</td>
                    <td class="p-3 text-right font-bold text-[#4A3B32]">${parseFloat(item.actualCash || 0).toLocaleString()}</td>
                    <td class="p-3 text-right font-bold ${diffColor}">${item.diff > 0 ? '+' : ''}${parseFloat(item.diff || 0).toLocaleString()}</td>
                    <td class="p-3 text-center text-xs text-[#8D6E63] font-medium">${item.officer || '-'}</td>
                    <td class="p-3 text-center">${linkBtn}</td>
                </tr>
            `;
        });
        tbody.innerHTML = html;
    }

    function submitClosing() {
        const dateFilter = document.getElementById('acc_date_filter').value;
        const sysCash = parseFloat(document.getElementById('closing_system_cash').value || 0);
        const actCash = parseFloat(document.getElementById('closing_actual_cash').value.replace(/,/g, '') || 0);
        const diff = actCash - sysCash;
        const note = document.getElementById('closing_note').value;
        
        let officerName = "System";
        if (typeof currentAdmin !== 'undefined' && currentAdmin && currentAdmin.name) {
            officerName = currentAdmin.name;
        } else {
            const el = document.getElementById('dash_admin_name');
            if (el) officerName = el.innerText;
        }

        if(!confirm("ยืนยันการปิดยอดประจำวัน? \nระบบจะสร้างรายงาน PDF อัตโนมัติและไม่สามารถแก้ไขได้อีก")) return;

        const loader = document.getElementById('dashLoading');
        if(loader) loader.classList.remove('hidden');

        let reportHtmlString = "";
        try {
            reportHtmlString = generateDailyReportHtml(window.currentDashboardData, dateFilter, actCash, diff, note);
        } catch(e) {
            console.error("HTML Generation Failed before submit", e);
        }

        const data = {
            date: dateFilter,
            systemTotal: document.getElementById('rpt_sum_total') ? document.getElementById('rpt_sum_total').innerText.replace(/,/g, '') : "0",
            systemCash: sysCash,
            systemTransfer: 0, 
            cashInDrawer: actCash,
            diff: diff,
            note: note,
            officer: officerName,
            htmlContent: reportHtmlString 
        };
        
        google.script.run.withSuccessHandler((res) => {
             if(loader) loader.classList.add('hidden');
             if(res.success) {
                 alert("บันทึกปิดยอดเรียบร้อย");
                 // Refresh Data to trigger the Lock
                 fetchAccountingOnly();
                 switchClosingTab('history');
             } else {
                 alert("เกิดข้อผิดพลาด: " + res.message);
             }
        }).withFailureHandler((err) => {
             if(loader) loader.classList.add('hidden');
             alert("Error: " + err);
        }).saveDailyClosing(data);
    }
</script>
