<!-- Khlong Thom Ticket Modal -->
<div id="khlongThomModal" class="hidden fixed inset-0 bg-gray-900/80 backdrop-blur-sm flex items-center justify-center z-[80] opacity-0 pointer-events-none modal transition-opacity duration-300">
    <div class="modal-overlay absolute w-full h-full" onclick="closeKhlongThomModal()"></div>
    
    <div class="bg-white w-11/12 md:max-w-md mx-auto rounded-xl shadow-2xl z-50 overflow-hidden flex flex-col animate-bounce-in">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-teal-600 to-emerald-600 px-4 py-3 flex justify-between items-center shrink-0">
            <h3 class="font-bold text-lg text-white flex items-center gap-2">
                <i class="fa-solid fa-truck-pickup"></i> จัดการตั๋วคลองถม
            </h3>
            <button onclick="closeKhlongThomModal()" class="text-white hover:text-teal-200 transition">
                <i class="fa-solid fa-times text-xl"></i>
            </button>
        </div>

        <!-- Global Option: Select Type -->
        <div class="px-5 py-3 bg-gray-50 border-b border-gray-200">
            <label class="block text-xs font-bold text-gray-700 mb-2">เลือกประเภทคลองถม:</label>
            <div class="flex gap-4">
                <label class="inline-flex items-center cursor-pointer">
                    <input type="radio" name="kt_ticketType" value="Main" checked class="form-radio text-teal-600 h-4 w-4" onchange="updateKtTypeUI()">
                    <span class="ml-2 text-sm font-bold text-gray-800">คลองถม (หลัก)</span>
                </label>
                <label class="inline-flex items-center cursor-pointer">
                    <input type="radio" name="kt_ticketType" value="General" class="form-radio text-teal-600 h-4 w-4" onchange="updateKtTypeUI()">
                    <span class="ml-2 text-sm font-bold text-gray-800">คลองถมทั่วไป</span>
                </label>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-gray-200 bg-white">
            <button onclick="switchKtTab('print')" id="ktTabPrint" class="flex-1 py-3 text-sm font-bold text-teal-700 border-b-2 border-teal-600 bg-teal-50 transition-colors">
                <i class="fa-solid fa-print mr-1"></i> พิมพ์ตั๋วล่วงหน้า
            </button>
            <button onclick="switchKtTab('reconcile')" id="ktTabReconcile" class="flex-1 py-3 text-sm font-bold text-gray-500 border-b-2 border-transparent hover:text-teal-600 transition-colors">
                <i class="fa-solid fa-calculator mr-1"></i> สรุปยอด/ส่งเงิน
            </button>
        </div>

        <!-- Content Area -->
        <div class="p-5 overflow-y-auto max-h-[65vh]">
            
            <!-- TAB 1: Print Tickets -->
            <div id="ktContentPrint" class="space-y-4">
                <div class="bg-teal-50 p-3 rounded-lg border border-teal-100 text-sm text-teal-800 mb-2 shadow-inner">
                    <i class="fa-solid fa-circle-info mr-1"></i> ระบบจะสร้างรหัสตั๋วอัตโนมัติตามวันที่ <br>
                    <b class="ml-5 text-teal-600 text-base"><span id="kt_date_preview">คลองถม YYMMDD-XXX</span></b>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">ราคาตั๋วต่อคัน (บาท)</label>
                    <input type="number" id="kt_ticketPrice" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-lg font-bold text-teal-700 focus:ring-2 focus:ring-teal-500 outline-none" value="150" required>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">เริ่มตั้งแต่เลขที่</label>
                        <input type="number" id="kt_startNum" min="1" value="1" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-center font-bold focus:ring-2 focus:ring-teal-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">ถึงเลขที่</label>
                        <input type="number" id="kt_endNum" min="1" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-center font-bold focus:ring-2 focus:ring-teal-500 outline-none" placeholder="เช่น 50" required oninput="calcKtPrintCount()">
                    </div>
                </div>

                <div class="flex justify-between items-center bg-gray-100 p-3 rounded-lg border border-gray-200 mt-2">
                    <span class="text-sm font-bold text-gray-600">จำนวนที่ปริ้นท์:</span>
                    <span id="kt_totalPrintCount" class="text-xl font-bold text-teal-600">0 ใบ</span>
                </div>

                <button onclick="executePrintKhlongThom()" class="w-full py-3 mt-2 bg-teal-600 hover:bg-teal-700 text-white rounded-lg font-bold shadow-md transform active:scale-95 transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-print"></i> พิมพ์ตั๋วออกเครื่อง
                </button>
            </div>

            <!-- TAB 2: Reconcile / Submit Money -->
            <div id="ktContentReconcile" class="hidden space-y-4">
                
                <!-- ส่วนกำหนดค่าพื้นฐาน -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">วันที่ประจำรอบ</label>
                        <input type="date" id="kt_reconDate" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-700 focus:ring-2 focus:ring-teal-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">ราคาตั๋ว (บาท/คัน)</label>
                        <input type="number" id="kt_reconPrice" class="w-full border border-gray-300 rounded-lg px-3 py-2 font-bold text-teal-700 focus:ring-2 focus:ring-teal-500 outline-none bg-gray-50" value="150" oninput="calcKtReconTotal()">
                    </div>
                </div>

                <!-- ส่วน 1: ค่าตั๋ว -->
                <div class="pt-2">
                    <h4 class="text-xs font-bold text-teal-800 mb-2 border-b border-teal-200 pb-1">1. รายรับค่าตั๋ว (จำนวนคัน)</h4>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-green-50 p-2 rounded-lg border border-green-200">
                            <label class="block text-[11px] font-bold text-green-700 mb-1 text-center"><i class="fa-solid fa-money-bill-wave"></i> สด (คัน)</label>
                            <input type="number" id="kt_cashCount" min="0" value="0" class="w-full border border-green-300 rounded px-2 py-1 text-center font-bold text-green-800 focus:ring-1 focus:ring-green-500 outline-none" oninput="calcKtReconTotal()">
                        </div>
                        <div class="bg-blue-50 p-2 rounded-lg border border-blue-200">
                            <label class="block text-[11px] font-bold text-blue-700 mb-1 text-center"><i class="fa-solid fa-mobile-screen"></i> โอน (คัน)</label>
                            <input type="number" id="kt_transferCount" min="0" value="0" class="w-full border border-blue-300 rounded px-2 py-1 text-center font-bold text-blue-800 focus:ring-1 focus:ring-blue-500 outline-none" oninput="calcKtReconTotal()">
                        </div>
                    </div>
                </div>

                <!-- ส่วน 2: ค่าไฟ -->
                <div class="pt-2">
                    <h4 class="text-xs font-bold text-yellow-700 mb-2 border-b border-yellow-200 pb-1"><i class="fa-solid fa-bolt"></i> 2. รายรับค่าไฟ (บาท)</h4>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-yellow-50 p-2 rounded-lg border border-yellow-200">
                            <label class="block text-[11px] font-bold text-yellow-700 mb-1 text-center"><i class="fa-solid fa-money-bill-wave"></i> ค่าไฟ สด (บ.)</label>
                            <input type="number" id="kt_elecCash" min="0" value="0" class="w-full border border-yellow-300 rounded px-2 py-1 text-center font-bold text-yellow-800 focus:ring-1 focus:ring-yellow-500 outline-none" oninput="calcKtReconTotal()">
                        </div>
                        <div class="bg-yellow-50 p-2 rounded-lg border border-yellow-200">
                            <label class="block text-[11px] font-bold text-yellow-700 mb-1 text-center"><i class="fa-solid fa-mobile-screen"></i> ค่าไฟ โอน (บ.)</label>
                            <input type="number" id="kt_elecTransfer" min="0" value="0" class="w-full border border-yellow-300 rounded px-2 py-1 text-center font-bold text-yellow-800 focus:ring-1 focus:ring-yellow-500 outline-none" oninput="calcKtReconTotal()">
                        </div>
                    </div>
                </div>

                <!-- สรุปยอดรวม -->
                <div class="bg-gray-800 p-3 rounded-lg mt-2 text-white shadow-inner flex flex-col gap-1">
                    <div class="flex justify-between items-center text-xs text-gray-300">
                        <span>ยอดตั๋วรวม:</span>
                        <span id="kt_ticketTotalDisplay">0</span>
                    </div>
                    <div class="flex justify-between items-center text-xs text-gray-300 border-b border-gray-600 pb-1 mb-1">
                        <span>ยอดค่าไฟรวม:</span>
                        <span id="kt_elecTotalDisplay">0</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <span class="text-sm font-bold text-white">รวมส่งยอดทั้งหมด</span>
                        <span id="kt_grandTotal" class="text-2xl font-bold text-yellow-400">0</span>
                    </div>
                </div>

                <button onclick="submitKhlongThomReconciliation()" class="w-full py-3 mt-1 bg-gray-800 hover:bg-black text-white rounded-lg font-bold shadow-md transform active:scale-95 transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-save"></i> ยืนยันบันทึกส่งยอด
                </button>
            </div>

        </div>
    </div>
</div>
