<script>
    /**
     * Scripts_Archive
     * จัดการฟังก์ชัน Archive (ย้ายข้อมูลเก่าไปเก็บ)
     * Update: อัปเดตข้อความแจ้งเตือนรวมระบบบัญชีย้อนหลัง 60 วัน
     */
    function confirmArchive() {
        if(typeof showConfirm !== 'function') {
            console.error("Error: UI module not loaded");
            return;
        }
        
        if (!currentAdmin) {
            showAlert("กรุณาเข้าสู่ระบบก่อนใช้งาน", "แจ้งเตือน", true);
            return;
        }

        const msg = "ระบบจะดำเนินการเคลียร์พื้นที่ข้อมูล (Hot Data) เพื่อให้ระบบทำงานรวดเร็วขึ้น ดังนี้:\n\n" +
                    "1. ข้อมูล 'ผังรายวัน': ที่เก่ากว่าเมื่อวาน จะถูกย้ายไป Archive\n" +
                    "2. ข้อมูล 'บัญชี/การเงิน': ที่เก่ากว่า 60 วัน จะถูกย้ายไป Archive\n\n" +
                    "ต้องการดำเนินการต่อหรือไม่?";

        showConfirm(
            msg, 
            "⚠️ ยืนยันการเคลียร์พื้นที่ระบบ", 
            () => {
                showLoader();
                google.script.run
                    .withSuccessHandler((res) => {
                        hideLoader();
                        if (res.success) {
                            if(typeof fetchData === 'function') fetchData(true);
                            showAlert("สำเร็จ:\n" + res.message, "การจัดเก็บเสร็จสิ้น", false);
                        } else {
                            showAlert("เกิดข้อผิดพลาด: " + res.message, "ข้อผิดพลาด", true);
                        }
                    })
                    .withFailureHandler((err) => {
                        hideLoader();
                        showAlert("Error: " + err, "ข้อผิดพลาดระบบ", true);
                    })
                    .runArchiveProcess();
            }
        );
    }
</script>
