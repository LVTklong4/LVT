<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนสมาชิกตลาดนัด</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- ไม่ต้องใช้ LIFF SDK แล้ว -->
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #FDF5E6; color: #4A3B32; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .vintage-card { background-color: #FFF8DC; border: 2px solid #8B4513; border-radius: 15px; box-shadow: 5px 5px 0px rgba(139, 69, 19, 0.2); position: relative; overflow: hidden; }
        .paper-texture { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url('https://www.transparenttextures.com/patterns/paper.png'); opacity: 0.5; pointer-events: none; }
        .font-hand { font-family: 'Mali', cursive; }
        .input-vintage { background-color: #FFF; border: 2px solid #D2B48C; border-radius: 8px; padding: 10px 15px; width: 100%; outline: none; transition: all 0.3s; color: #5D4037; font-weight: 600; }
        .btn-vintage { background-color: #8B4513; color: #FFF; border: none; border-radius: 8px; padding: 12px; width: 100%; font-family: 'Mali', cursive; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .profile-img-container { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #8B4513; overflow: hidden; margin: 0 auto 15px; background-color: #E0C097; position: relative; z-index: 10; }
    </style>
</head>
<body class="p-4">

    <!-- Error Screen -->
    <div id="errorSection" class="vintage-card w-full max-w-sm p-8 hidden text-center">
         <i class="fa-solid fa-circle-exclamation text-4xl text-red-500 mb-4"></i>
         <p class="text-lg font-bold text-red-600">ลิงก์ไม่ถูกต้อง</p>
         <p class="text-sm text-gray-500 mt-2">กรุณาพิมพ์ "สมัครสมาชิก" ในไลน์ เพื่อรับลิงก์ใหม่</p>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="vintage-card w-full max-w-sm p-6 hidden">
        <div class="paper-texture"></div>
        <div class="relative z-10 text-center">
            <div class="profile-img-container">
                <img src="https://via.placeholder.com/100?text=USER" class="w-full h-full object-cover">
            </div>
            
            <h1 class="text-xl font-hand font-bold text-[#5D4037] mb-1">ลงทะเบียนร้านค้า</h1>
            <p class="text-xs text-[#8D6E63] mb-6">กรอกข้อมูลเพื่อรับสิทธิพิเศษ</p>

            <form onsubmit="submitRegistration(event)" class="space-y-4 text-left">
                <input type="hidden" id="userId">
                <input type="hidden" id="displayName" value="LINE User"> 
                <input type="hidden" id="pictureUrl" value="">
                
                <div>
                    <label class="block text-xs font-bold text-[#8D6E63] mb-1 pl-1">ชื่อร้านค้า</label>
                    <input type="text" id="shopName" class="input-vintage" placeholder="ระบุชื่อร้านค้า" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-[#8D6E63] mb-1 pl-1">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phoneNumber" class="input-vintage" placeholder="08x-xxxxxxx" maxlength="10" required pattern="[0-9]{9,10}">
                </div>
                <div class="pt-2">
                    <button type="submit" class="btn-vintage">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Start immediately
        (function init() {
            // ดึง UID จาก URL (Magic Link)
            const urlParams = new URLSearchParams(window.location.search);
            const uid = urlParams.get('uid');

            if (!uid) {
                document.getElementById('errorSection').classList.remove('hidden');
                return;
            }

            document.getElementById('userId').value = uid;
            document.getElementById('registerForm').classList.remove('hidden');

            // เช็คว่าเคยลงทะเบียนไหม (Pre-fill)
            google.script.run.withSuccessHandler((res) => {
                if (res.registered) {
                    document.getElementById('shopName').value = res.shopName;
                    document.getElementById('phoneNumber').value = res.phone;
                    Swal.fire({
                        icon: 'info', 
                        title: 'พบข้อมูลเดิม', 
                        text: 'ระบบดึงข้อมูลร้านของคุณมาให้แล้ว',
                        timer: 2000, showConfirmButton: false
                    });
                }
            }).checkMemberStatus(uid);
        })();

        function submitRegistration(e) {
            e.preventDefault();
            const shopName = document.getElementById('shopName').value.trim();
            const phone = document.getElementById('phoneNumber').value.trim();
            const uid = document.getElementById('userId').value;

            Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => { Swal.showLoading(); } });

            const data = {
                userId: uid,
                displayName: "LINE User (" + phone.substr(-4) + ")", // Default name since we don't use SDK
                pictureUrl: "",
                shopName: shopName,
                phone: phone
            };

            google.script.run.withSuccessHandler((res) => {
                if (res.success) {
                    Swal.fire({
                        icon: 'success', title: 'ลงทะเบียนสำเร็จ!', text: 'ขอบคุณครับ',
                        confirmButtonColor: '#2E7D32'
                    }).then(() => { 
                        // ปิดหน้าต่าง (สำหรับ Browser มือถือ)
                        window.close();
                        document.body.innerHTML = '<div class="flex items-center justify-center h-screen text-green-700 font-bold">บันทึกเรียบร้อย ปิดหน้านี้ได้เลยครับ</div>';
                    });
                } else {
                    Swal.fire('เกิดข้อผิดพลาด', res.message, 'error');
                }
            }).withFailureHandler((err) => {
                Swal.fire('Error', err.message, 'error');
            }).registerLineMember(data);
        }
    </script>
</body>
</html>
